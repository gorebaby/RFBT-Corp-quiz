function answerSet(q){return new Set(q.answer_letters.map(x=>x.toUpperCase()));}
function selectedSet(qnum){const inputs=[...document.querySelectorAll('[data-q="'+qnum+'"] input:checked')];return new Set(inputs.map(i=>i.dataset.label.toUpperCase()));}
function setsEqual(a,b){if(a.size!==b.size)return false;for(const v of a)if(!b.has(v))return false;return true;}
function updateSummary(){let answered=0,correct=0;questions.forEach(q=>{const sel=selectedSet(q.number);if(sel.size)answered++;if(sel.size&&setsEqual(sel,answerSet(q)))correct++;});document.getElementById('progress').textContent='Answered: '+answered+' / '+questions.length;document.getElementById('score').textContent='Score: '+correct+' / '+questions.length;}
function render(){const quiz=document.getElementById('quiz');const jump=document.getElementById('jumpgrid');quiz.innerHTML='';jump.innerHTML='';questions.forEach(q=>{const j=document.createElement('a');j.href='#q-'+q.number;j.textContent=q.number;jump.appendChild(j);const card=document.createElement('div');card.className='question-card';card.id='q-'+q.number;card.innerHTML='<div class="qhead"><div class="qnum">Question '+q.number+'</div><div class="small">Answer key: '+q.answer+'</div></div><div class="qtext">'+q.question+'</div><div class="opts"></div><div class="controls"><button onclick="checkOne('+q.number+')">Check</button><button onclick="showAnswer('+q.number+')">Reveal</button><span class="small">'+(q.multi?'Select all correct letters for this item.':'Select one answer.')+'</span></div><div class="status" id="status-'+q.number+'"></div>';const opts=card.querySelector('.opts');q.options.forEach(opt=>{const label=document.createElement('label');label.className='option';label.dataset.q=q.number;label.innerHTML='<input type="'+(q.multi?'checkbox':'radio')+'" name="q-'+q.number+'" data-label="'+opt.label+'"> <strong>'+opt.label+'.</strong> '+opt.text;label.querySelector('input').addEventListener('change',updateSummary);opts.appendChild(label);});quiz.appendChild(card);});updateSummary();}
function clearStyles(qnum){document.querySelectorAll('[data-q="'+qnum+'"]').forEach(el=>el.classList.remove('correct','wrong'));}
function checkOne(qnum){const q=questions.find(x=>x.number===qnum);const right=answerSet(q);const sel=selectedSet(qnum);clearStyles(qnum);document.querySelectorAll('[data-q="'+qnum+'"]').forEach(el=>{const input=el.querySelector('input');const label=input.dataset.label.toUpperCase();if(right.has(label))el.classList.add('correct');if(input.checked&&!right.has(label))el.classList.add('wrong');});const st=document.getElementById('status-'+qnum);if(!sel.size)st.textContent='No answer selected yet.';else st.textContent=setsEqual(sel,right)?'Correct.':'Not correct. Correct answer: '+q.answer;updateSummary();}
function showAnswer(qnum){const q=questions.find(x=>x.number===qnum);const right=answerSet(q);document.querySelectorAll('[name="q-'+qnum+'"]').forEach(i=>i.checked=right.has(i.dataset.label.toUpperCase()));checkOne(qnum);}
function checkAll(){questions.forEach(q=>checkOne(q.number));}
function revealAll(){questions.forEach(q=>showAnswer(q.number));}
function resetQuiz(){document.querySelectorAll('input').forEach(i=>i.checked=false);document.querySelectorAll('.option').forEach(el=>el.classList.remove('correct','wrong'));document.querySelectorAll('.status').forEach(el=>el.textContent='');updateSummary();}
render();</script></body></html>
